<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horiverse Admin — PUBG Stats</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --gold: #d9b457;
      --gold-light: #e5c982;
      --dark: #1a1a2e;
      --dark2: #16213e;
      --dark3: #0f3460;
      --card: #1e1e3a;
      --card2: #252550;
      --text: #e0e0f0;
      --text-dim: #9090b0;
      --green: #2ecc71;
      --red: #e74c3c;
      --blue: #3498db;
      --hori: #d9b457;
      --tami: #3498db;
      --border: rgba(217,180,87,0.15);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }

    /* ─── LOGIN OVERLAY ─── */
    #login-overlay {
      position:fixed; inset:0; background:var(--dark);
      display:flex; align-items:center; justify-content:center; z-index:9999;
    }
    .login-box {
      background:var(--card); border:1px solid var(--border);
      border-radius:16px; padding:48px 40px; width:360px; text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
    }
    .login-logo { font-size:2rem; font-weight:700; color:var(--gold); margin-bottom:8px; }
    .login-logo span { color:var(--text-dim); font-weight:300; }
    .login-subtitle { color:var(--text-dim); font-size:0.85rem; margin-bottom:32px; }
    .login-box input {
      width:100%; padding:12px 16px; background:var(--dark2); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-family:inherit; font-size:0.95rem;
      margin-bottom:12px; outline:none; transition:border-color 0.2s;
    }
    .login-box input:focus { border-color:var(--gold); }
    .login-btn {
      width:100%; padding:13px; background:var(--gold); color:#1a1a2e;
      border:none; border-radius:8px; font-weight:700; font-size:1rem;
      cursor:pointer; transition:all 0.2s; margin-top:8px;
    }
    .login-btn:hover { background:var(--gold-light); transform:translateY(-1px); }
    #login-error { color:var(--red); font-size:0.85rem; margin-top:12px; display:none; }

    /* ─── DASHBOARD LAYOUT ─── */
    #app { display:none; }
    .topbar {
      background:var(--dark2); border-bottom:1px solid var(--border);
      padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100;
    }
    .topbar-logo { font-size:1.4rem; font-weight:700; color:var(--gold); }
    .topbar-logo span { color:var(--text-dim); font-weight:300; }
    .topbar-right { display:flex; align-items:center; gap:16px; }
    .topbar-tag { font-size:0.75rem; color:var(--text-dim); background:var(--card); padding:4px 10px; border-radius:20px; }
    .logout-btn {
      background:transparent; border:1px solid var(--border); color:var(--text-dim);
      padding:6px 14px; border-radius:6px; cursor:pointer; font-size:0.8rem;
      transition:all 0.2s; font-family:inherit;
    }
    .logout-btn:hover { border-color:var(--red); color:var(--red); }

    .main-wrap { padding:24px; max-width:1400px; margin:0 auto; }

    /* ─── OVERALL STATS ─── */
    .section-title { font-size:1.1rem; font-weight:600; color:var(--gold); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .section-title i { font-size:0.9rem; }

    .overall-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-bottom:32px; }
    .stat-card {
      background:var(--card); border:1px solid var(--border); border-radius:12px;
      padding:16px 20px;
    }
    .stat-card .label { font-size:0.72rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
    .stat-card .value { font-size:1.4rem; font-weight:700; color:var(--text); }
    .stat-card .sub { font-size:0.75rem; color:var(--text-dim); margin-top:2px; }
    .stat-card.hori-card .value { color:var(--hori); }
    .stat-card.tami-card .value { color:var(--tami); }
    .stat-card.green-card .value { color:var(--green); }

    .comparison-bar { display:flex; border-radius:6px; overflow:hidden; height:8px; margin-top:6px; }
    .comparison-bar .hori-seg { background:var(--hori); }
    .comparison-bar .eq-seg { background:var(--text-dim); }
    .comparison-bar .tami-seg { background:var(--tami); }

    /* ─── OVERALL STATS TABLE ─── */
    .stats-table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden; border:1px solid var(--border); }
    .stats-table thead th { padding:12px 16px; font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; border-bottom:2px solid var(--border); }
    .th-common { color:var(--text-dim); text-align:center; }
    .th-hori { color:var(--hori); text-align:center; }
    .th-tami { color:var(--tami); text-align:center; }
    .stats-table tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; }
    .stats-table tbody tr:hover { background:rgba(255,255,255,0.03); }
    .stats-table tbody tr:last-child { border-bottom:none; }
    .st-label { padding:10px 16px; font-size:0.8rem; color:var(--text-dim); white-space:nowrap; width:200px; }
    .st-common { padding:10px 16px; text-align:center; font-size:0.85rem; font-weight:500; }
    .st-hori { padding:10px 16px; text-align:center; font-size:0.85rem; font-weight:600; color:var(--hori); }
    .st-tami { padding:10px 16px; text-align:center; font-size:0.85rem; font-weight:600; color:var(--tami); }
    .tr-section td { padding:8px 16px; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); background:var(--card2); border-top:2px solid var(--border); }

    /* ─── GAME DAY LIST & DETAIL ─── */
    .panel-row { display:grid; grid-template-columns:320px 1fr; gap:20px; align-items:start; }
    .panel-left { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .panel-left-header {
      padding:14px 16px; background:var(--card2); border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .panel-left-header h3 { font-size:0.9rem; font-weight:600; }
    .add-day-btn {
      background:var(--gold); color:#1a1a2e; border:none; border-radius:6px;
      padding:6px 12px; font-size:0.78rem; font-weight:600; cursor:pointer;
      display:flex; align-items:center; gap:4px; font-family:inherit; transition:all 0.2s;
    }
    .add-day-btn:hover { background:var(--gold-light); }

    .game-day-list { max-height:600px; overflow-y:auto; }
    .game-day-item {
      padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer;
      display:flex; align-items:center; justify-content:space-between;
      transition:background 0.15s;
    }
    .game-day-item:hover { background:var(--card2); }
    .game-day-item.active { background:rgba(217,180,87,0.1); border-left:3px solid var(--gold); }
    .game-day-item .gd-num { font-weight:600; font-size:0.9rem; }
    .game-day-item .gd-date { font-size:0.75rem; color:var(--text-dim); }
    .game-day-item .gd-score { font-size:0.75rem; color:var(--gold); background:rgba(217,180,87,0.1); padding:2px 7px; border-radius:10px; }

    /* ─── DETAIL PANEL ─── */
    .panel-right { background:var(--card); border:1px solid var(--border); border-radius:12px; }
    .detail-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .detail-header h3 { font-size:1rem; font-weight:600; }
    .detail-actions { display:flex; gap:8px; }
    .btn-edit, .btn-save, .btn-cancel, .btn-delete {
      border:none; border-radius:6px; padding:7px 14px; font-size:0.8rem;
      font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; display:flex; align-items:center; gap:4px;
    }
    .btn-edit { background:var(--card2); color:var(--text); border:1px solid var(--border); }
    .btn-edit:hover { border-color:var(--gold); color:var(--gold); }
    .btn-save { background:var(--green); color:#fff; }
    .btn-save:hover { background:#27ae60; }
    .btn-cancel { background:var(--card2); color:var(--text-dim); border:1px solid var(--border); }
    .btn-cancel:hover { border-color:var(--red); color:var(--red); }
    .btn-delete { background:transparent; color:var(--red); border:1px solid rgba(231,76,60,0.3); }
    .btn-delete:hover { background:var(--red); color:#fff; }

    .detail-body { padding:20px; }
    .detail-meta { display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
    .detail-meta label { font-size:0.75rem; color:var(--text-dim); display:block; margin-bottom:3px; }
    .detail-meta input[type=text], .detail-meta input[type=number] {
      background:var(--dark2); border:1px solid var(--border); color:var(--text);
      border-radius:6px; padding:7px 10px; font-family:inherit; font-size:0.85rem;
      outline:none; transition:border-color 0.2s;
    }
    .detail-meta input:focus { border-color:var(--gold); }

    /* ─── GAMES TABLE ─── */
    .games-table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:0.82rem; }
    thead th {
      padding:10px 8px; text-align:center; font-weight:600; font-size:0.72rem;
      text-transform:uppercase; letter-spacing:0.4px; color:var(--text-dim);
      border-bottom:2px solid var(--border); white-space:nowrap;
    }
    thead th.hori-col { color:var(--hori); }
    thead th.tami-col { color:var(--tami); }
    tbody tr { border-bottom:1px solid var(--border); transition:background 0.1s; }
    tbody tr:hover { background:rgba(255,255,255,0.03); }
    tbody tr.total-row { background:rgba(217,180,87,0.05); border-top:2px solid var(--border); }
    tbody td { padding:8px; text-align:center; }
    tbody td.game-num { font-weight:600; color:var(--text-dim); font-size:0.75rem; }
    tbody td.rank-cell { font-weight:600; }
    .rank-1 { color:var(--gold); }
    .rank-top3 { color:var(--green); }

    /* editable cells */
    .editable { outline:none; }
    .edit-mode .editable {
      background:var(--dark2); border:1px solid var(--border); border-radius:4px;
      padding:4px 6px; color:var(--text); font-family:inherit; font-size:0.82rem;
      width:60px; text-align:center;
    }
    .edit-mode .editable:focus { border-color:var(--gold); }

    /* ─── DAY SUMMARY BARS ─── */
    .day-summary { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; margin-top:20px; }
    .day-stat { background:var(--dark2); border-radius:8px; padding:12px 14px; }
    .day-stat .ds-label { font-size:0.7rem; color:var(--text-dim); margin-bottom:3px; }
    .day-stat .ds-val { font-size:1.1rem; font-weight:600; }
    .day-stat .ds-sub { font-size:0.7rem; color:var(--text-dim); margin-top:1px; }

    /* ─── EMPTY / LOADING ─── */
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-dim); }
    .empty-state i { font-size:2.5rem; margin-bottom:12px; display:block; }
    .toast {
      position:fixed; bottom:24px; right:24px; background:var(--green); color:#fff;
      padding:12px 20px; border-radius:8px; font-size:0.85rem; font-weight:500;
      box-shadow:0 4px 20px rgba(0,0,0,0.3); z-index:9998;
      transform:translateY(100px); opacity:0; transition:all 0.3s;
    }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.error { background:var(--red); }

    .total-computed {
      display: inline-block;
      color: var(--gold);
      font-weight: 600;
      min-width: 40px;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:var(--dark); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    @media(max-width:900px) {
      .panel-row { grid-template-columns:1fr; }
      .overall-grid { grid-template-columns:repeat(2,1fr); }
    }
    @media(max-width:500px) {
      .main-wrap { padding:12px; }
      .overall-grid { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">Hori<span>verse</span></div>
    <div class="login-subtitle">Admin Panel · PUBG Stats</div>
    <input type="text" id="login-user" placeholder="Username" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
    <div id="login-error">Invalid username or password.</div>
  </div>
</div>

<!-- ─── APP ─── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Hori<span>verse</span></div>
    <div class="topbar-right">
      <span class="topbar-tag"><i class="fas fa-gamepad"></i> PUBG Stats</span>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>

  <div class="main-wrap">

    <!-- OVERALL -->
    <div class="section-title"><i class="fas fa-chart-bar"></i> Overall Statistics</div>
    <div id="overall-grid" style="margin-bottom:32px">
      <div style="color:var(--text-dim);padding:20px">Loading...</div>
    </div>

    <!-- GAME DAYS -->
    <div class="section-title"><i class="fas fa-calendar-alt"></i> Game Days</div>
    <div class="panel-row">
      <div class="panel-left">
        <div class="panel-left-header">
          <h3>Game Day List</h3>
          <button class="add-day-btn" onclick="newGameDay()"><i class="fas fa-plus"></i> New</button>
        </div>
        <div class="game-day-list" id="gd-list"></div>
      </div>
      <div class="panel-right" id="detail-panel">
        <div class="empty-state">
          <i class="fas fa-hand-pointer"></i>
          <div>Select a Game Day or add a new one</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────
let statsData = null;
let selectedGD = null;
let editMode = false;
let isNew = false;

// ─── LOGIN ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-overlay').style.display !== 'none') doLogin();
});

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (r.ok) {
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadStats();
    } else {
      err.style.display = 'block';
    }
  } catch {
    err.style.display = 'block';
  }
}

async function doLogout() {
  await fetch('/api/logout', { method: 'POST' });
  location.reload();
}

// ─── DATA ────────────────────────────────────────────
async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    if (r.status === 401) { location.reload(); return; }
    const body = await r.json();
    if (!r.ok) {
      document.getElementById('overall-grid').innerHTML =
        `<div style="color:var(--red);padding:20px;background:var(--card);border-radius:8px;font-size:0.85rem">
          <strong>API Error ${r.status}:</strong> ${body.error || 'Unknown error'}<br>
          <span style="color:var(--text-dim);font-size:0.75rem">Check Vercel env vars: GITHUB_TOKEN, GITHUB_OWNER, GITHUB_REPO</span>
        </div>`;
      return;
    }
    statsData = body;
    renderOverall(statsData.overall);
    renderGDList(statsData.game_days);
  } catch (e) {
    document.getElementById('overall-grid').innerHTML =
      `<div style="color:var(--red);padding:20px;background:var(--card);border-radius:8px;font-size:0.85rem">
        <strong>Network error:</strong> ${e.message}
      </div>`;
  }
}

// ─── OVERALL ─────────────────────────────────────────
function renderOverall(o) {
  if (!o) return;

  function parseComp(str) {
    if (!str) return [50, 0, 50];
    const m = str.match(/H: %(\d+\.?\d*), Eq:%(\d+\.?\d*), T: %(\d+\.?\d*)/);
    return m ? [parseFloat(m[1]), parseFloat(m[2]), parseFloat(m[3])] : [50, 0, 50];
  }

  const hp = parseComp(o.hp_comparison);
  const kl = parseComp(o.kill_comparison);

  function bar(seg) {
    return `<div class="comparison-bar" style="margin-top:6px">
      <div class="hori-seg" style="width:${seg[0]}%"></div>
      <div class="eq-seg" style="width:${seg[1]}%"></div>
      <div class="tami-seg" style="width:${seg[2]}%"></div>
    </div>`;
  }

  function row(label, common, hori, tami) {
    return `<tr>
      <td class="st-label">${label}</td>
      <td class="st-common">${common ?? '—'}</td>
      <td class="st-hori">${hori ?? '—'}</td>
      <td class="st-tami">${tami ?? '—'}</td>
    </tr>`;
  }

  document.getElementById('overall-grid').innerHTML = `
    <table class="stats-table">
      <thead>
        <tr>
          <th></th>
          <th class="th-common">Common</th>
          <th class="th-hori">Horizon</th>
          <th class="th-tami">Tami</th>
        </tr>
      </thead>
      <tbody>
        ${row('Total Games', o.total_games_played, '—', '—')}
        ${row('Wins / Win Rate', `${o.total_wins} (${o.win_rate})`, '—', '—')}
        ${row('Top 3 / Top3 Rate', `${o.total_top3} (${o.top3_rate})`, '—', '—')}
        ${row('Total Kills', '—', o.hori_total_kills, o.tami_total_kills)}
        ${row('Kill Avg / game', '—', o.hori_kill_avg, o.tami_kill_avg)}
        ${row('Max Kills (single game)', '—', o.hori_max_kill, o.tami_max_kill)}
        ${row('Max Damage (single game)', '—', o.hori_damage_max, o.tami_damage_max)}
        ${row('Damage Mean / Median', '—', o.hori_damage_mean_median, o.tami_damage_mean_median)}
        <tr>
          <td class="st-label">Damage Lead %</td>
          <td class="st-common" colspan="3">
            <div style="display:flex;align-items:center;gap:10px;font-size:0.78rem">
              <span style="color:var(--hori)">Hori %${hp[0]}</span>
              <div style="flex:1">${bar(hp)}</div>
              <span style="color:var(--tami)">Tami %${hp[2]}</span>
              <span style="color:var(--text-dim);font-size:0.72rem">Eq %${hp[1]}</span>
            </div>
          </td>
        </tr>
        <tr>
          <td class="st-label">Kill Lead %</td>
          <td class="st-common" colspan="3">
            <div style="display:flex;align-items:center;gap:10px;font-size:0.78rem">
              <span style="color:var(--hori)">Hori %${kl[0]}</span>
              <div style="flex:1">${bar(kl)}</div>
              <span style="color:var(--tami)">Tami %${kl[2]}</span>
              <span style="color:var(--text-dim);font-size:0.72rem">Eq %${kl[1]}</span>
            </div>
          </td>
        </tr>
        <tr class="tr-section"><td colspan="4">Best Performances</td></tr>
        ${row('Best Team Kill Day', o.team_total_kill_best, '—', '—')}
        ${row('Best Team Avg Damage Day', o.team_avg_damage_best, '—', '—')}
        ${row('Best Team Score Day', o.team_avg_score_best, '—', '—')}
        ${row('Best Game Ever', o.best_game_ever, '—', '—')}
        ${row('Personal Best Game', '—', o.hori_best_game, o.tami_best_game)}
      </tbody>
    </table>
  `;
}

// ─── GAME DAY LIST ───────────────────────────────────
function renderGDList(gds) {
  const el = document.getElementById('gd-list');
  if (!gds || !gds.length) {
    el.innerHTML = '<div class="empty-state" style="padding:30px"><i class="fas fa-inbox"></i><div>No records yet</div></div>';
    return;
  }
  el.innerHTML = gds.map(gd => {
    const score = gd.total && gd.total.score ? Number(gd.total.score).toFixed(3) : '—';
    const active = selectedGD && selectedGD.game_no === gd.game_no ? 'active' : '';
    return `<div class="game-day-item ${active}" onclick="selectGD(${gd.game_no})">
      <div>
        <div class="gd-num">Game Day ${gd.game_no}</div>
        <div class="gd-date">${gd.date || '—'}</div>
      </div>
      <div class="gd-score">${score}</div>
    </div>`;
  }).join('');
}

// ─── SELECT GAME DAY ─────────────────────────────────
function selectGD(gno) {
  selectedGD = statsData.game_days.find(g => g.game_no === gno);
  editMode = false;
  isNew = false;
  renderGDList(statsData.game_days);
  renderDetail();
}

// ─── NEW GAME DAY ────────────────────────────────────
function newGameDay() {
  const maxNo = statsData.game_days.length > 0
    ? Math.max(...statsData.game_days.map(g => g.game_no))
    : 0;
  const today = new Date();
  const dd = String(today.getDate()).padStart(2,'0');
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const yyyy = today.getFullYear();
  selectedGD = {
    game_no: maxNo + 1,
    date: `${dd}.${mm}.${yyyy}`,
    best_game: '',
    games: Array.from({length:10}, (_,i) => ({
      game: i+1, hori_kill:0, hori_damage:0, tami_kill:0, tami_damage:0,
      rank:0, hori_score:0, tami_score:0, score:0
    })),
    total: { hori_kill:0, hori_damage:0, tami_kill:0, tami_damage:0, rank:0, hori_score:0, tami_score:0, score:0 }
  };
  editMode = true;
  isNew = true;
  renderDetail();
}

// ─── RENDER DETAIL ───────────────────────────────────
function renderDetail() {
  const el = document.getElementById('detail-panel');
  if (!selectedGD) { el.innerHTML = '<div class="empty-state"><i class="fas fa-hand-pointer"></i><div>Select a Game Day</div></div>'; return; }

  const gd = selectedGD;
  const em = editMode;

  const totalRow = gd.total || {};

  function cell(key, obj, cls='') {
    const v = obj[key] !== undefined && obj[key] !== null ? obj[key] : '';
    const disp = typeof v === 'number' ? (Number.isInteger(v) ? v : parseFloat(v.toFixed(4))) : v;
    if (em) return `<input class="editable" data-key="${key}" value="${disp}" type="text" inputmode="decimal" oninput="recalcTotal()">`;
    return `<span class="${cls}">${disp !== '' ? disp : '—'}</span>`;
  }

  function totalCell(key) {
    // in edit mode: read-only computed cell
    const v = totalRow[key];
    const disp = typeof v === 'number' ? (Number.isInteger(v) ? v : parseFloat(v.toFixed(4))) : (v ?? '—');
    if (em) return `<span class="total-computed" id="tc-${key}">${disp}</span>`;
    return `<span>${disp !== undefined && disp !== null && disp !== '' ? disp : '—'}</span>`;
  }

  function rankClass(r) {
    const n = Number(r);
    if (n === 1) return 'rank-1';
    if (n <= 3) return 'rank-top3';
    return '';
  }

  el.innerHTML = `
    <div class="detail-header">
      <h3>Game Day ${gd.game_no}</h3>
      <div class="detail-actions">
        ${em ? `
          <button class="btn-save" onclick="saveGD()"><i class="fas fa-check"></i> Save</button>
          <button class="btn-cancel" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel</button>
        ` : `
          <button class="btn-edit" onclick="startEdit()"><i class="fas fa-pen"></i> Edit</button>
          ${!isNew ? `<button class="btn-delete" onclick="deleteGD()"><i class="fas fa-trash"></i></button>` : ''}
        `}
      </div>
    </div>
    <div class="detail-body ${em ? 'edit-mode' : ''}">
      <div class="detail-meta">
        <div>
          <label>Game No</label>
          ${em ? `<input type="text" inputmode="numeric" id="meta-gno" value="${gd.game_no}" style="width:80px">` : `<strong>${gd.game_no}</strong>`}
        </div>
        <div>
          <label>Date</label>
          ${em ? `<input type="text" id="meta-date" value="${gd.date || ''}" placeholder="dd.mm.yyyy" style="width:120px">` : `<strong>${gd.date || '—'}</strong>`}
        </div>
        <div>
          <label>Best Game</label>
          ${em ? `<input type="text" id="meta-best" value="${gd.best_game || ''}" placeholder="Game 7" style="width:180px">` : `<strong>${gd.best_game || '—'}</strong>`}
        </div>
      </div>

      <div class="games-table-wrap">
        <table id="games-table">
          <thead>
            <tr>
              <th>#</th>
              <th class="hori-col">Hori Kill</th>
              <th class="hori-col">Hori Dmg</th>
              <th class="tami-col">Tami Kill</th>
              <th class="tami-col">Tami Dmg</th>
              <th>Rank</th>
              <th class="hori-col">Hori Score</th>
              <th class="tami-col">Tami Score</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="games-tbody">
            ${gd.games.map((g, idx) => `
              <tr data-idx="${idx}">
                <td class="game-num">${g.game}</td>
                <td>${cell('hori_kill', g)}</td>
                <td>${cell('hori_damage', g)}</td>
                <td>${cell('tami_kill', g)}</td>
                <td>${cell('tami_damage', g)}</td>
                <td class="rank-cell">${em ? cell('rank', g) : `<span class="${rankClass(g.rank)}">${g.rank !== undefined ? g.rank : '—'}</span>`}</td>
                <td>${cell('hori_score', g)}</td>
                <td>${cell('tami_score', g)}</td>
                <td>${cell('score', g)}</td>
              </tr>
            `).join('')}
            <tr class="total-row" id="total-row">
              <td class="game-num" style="color:var(--gold)">Σ</td>
              <td>${totalCell('hori_kill')}</td>
              <td>${totalCell('hori_damage')}</td>
              <td>${totalCell('tami_kill')}</td>
              <td>${totalCell('tami_damage')}</td>
              <td>${totalCell('rank')}</td>
              <td>${totalCell('hori_score')}</td>
              <td>${totalCell('tami_score')}</td>
              <td>${totalCell('score')}</td>
            </tr>
          </tbody>
        </table>
      </div>

      ${!em ? renderDaySummary(gd) : ''}
    </div>
  `;
}

function renderDaySummary(gd) {
  const t = gd.total || {};
  const games = gd.games || [];
  const wins = games.filter(g => Number(g.rank) === 1).length;
  const top3 = games.filter(g => Number(g.rank) <= 3 && Number(g.rank) > 0).length;
  const avgRank = games.reduce((s,g) => s + (Number(g.rank)||0), 0) / (games.length || 1);
  return `
    <div class="day-summary">
      <div class="day-stat">
        <div class="ds-label">Hori Total Kills</div>
        <div class="ds-val" style="color:var(--hori)">${t.hori_kill !== undefined ? t.hori_kill : '—'}</div>
      </div>
      <div class="day-stat">
        <div class="ds-label">Tami Total Kills</div>
        <div class="ds-val" style="color:var(--tami)">${t.tami_kill !== undefined ? t.tami_kill : '—'}</div>
      </div>
      <div class="day-stat">
        <div class="ds-label">Hori Avg Damage</div>
        <div class="ds-val" style="color:var(--hori)">${t.hori_damage !== undefined ? Number(t.hori_damage).toFixed(1) : '—'}</div>
      </div>
      <div class="day-stat">
        <div class="ds-label">Tami Avg Damage</div>
        <div class="ds-val" style="color:var(--tami)">${t.tami_damage !== undefined ? Number(t.tami_damage).toFixed(1) : '—'}</div>
      </div>
      <div class="day-stat">
        <div class="ds-label">Wins</div>
        <div class="ds-val" style="color:var(--green)">${wins}</div>
        <div class="ds-sub">Top3: ${top3}</div>
      </div>
      <div class="day-stat">
        <div class="ds-label">Avg Rank</div>
        <div class="ds-val">${avgRank.toFixed(1)}</div>
      </div>
      <div class="day-stat">
        <div class="ds-label">Team Score</div>
        <div class="ds-val" style="color:var(--gold)">${t.score !== undefined ? Number(t.score).toFixed(4) : '—'}</div>
      </div>
    </div>
  `;
}

// ─── EDIT ────────────────────────────────────────────
function startEdit() { editMode = true; renderDetail(); }

function cancelEdit() {
  if (isNew) { selectedGD = null; isNew = false; editMode = false; renderDetail(); return; }
  editMode = false;
  renderDetail();
}

function recalcTotal() {
  const tbody = document.getElementById('games-tbody');
  if (!tbody) return;
  const rows = tbody.querySelectorAll('tr[data-idx]');
  const sums = { hori_kill:0, hori_damage:0, tami_kill:0, tami_damage:0, rank:0, hori_score:0, tami_score:0, score:0 };
  rows.forEach(row => {
    row.querySelectorAll('input.editable').forEach(inp => {
      const k = inp.dataset.key;
      if (k in sums) sums[k] += parseFloat(inp.value) || 0;
    });
  });
  const n = rows.length || 1;
  // kills: sum | damage: avg | rank: avg | scores: avg
  const display = {
    hori_kill: sums.hori_kill,
    hori_damage: parseFloat((sums.hori_damage / n).toFixed(1)),
    tami_kill: sums.tami_kill,
    tami_damage: parseFloat((sums.tami_damage / n).toFixed(1)),
    rank: parseFloat((sums.rank / n).toFixed(1)),
    hori_score: parseFloat((sums.hori_score / n).toFixed(4)),
    tami_score: parseFloat((sums.tami_score / n).toFixed(4)),
    score: parseFloat((sums.score / n).toFixed(4)),
  };
  Object.entries(display).forEach(([k, v]) => {
    const el = document.getElementById(`tc-${k}`);
    if (el) el.textContent = v;
  });
}

function collectEditedData() {
  const gno = parseInt(document.getElementById('meta-gno').value) || selectedGD.game_no;
  const date = document.getElementById('meta-date').value.trim();
  const best = document.getElementById('meta-best').value.trim();

  const tbody = document.getElementById('games-tbody');
  const rows = tbody.querySelectorAll('tr[data-idx]');
  const games = [];
  rows.forEach((row, idx) => {
    const inputs = row.querySelectorAll('input.editable');
    const g = { game: idx + 1 };
    inputs.forEach(inp => { g[inp.dataset.key] = parseFloat(inp.value) || 0; });
    games.push(g);
  });

  // collect computed totals from the display spans
  const keys = ['hori_kill','hori_damage','tami_kill','tami_damage','rank','hori_score','tami_score','score'];
  const total = {};
  keys.forEach(k => {
    const el = document.getElementById(`tc-${k}`);
    total[k] = el ? parseFloat(el.textContent) || 0 : 0;
  });

  return { game_no: gno, date, best_game: best, games, total };
}

async function saveGD() {
  const game_day = collectEditedData();
  try {
    const r = await fetch('/api/stats', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'save_game_day', game_day })
    });
    if (!r.ok) { showToast('Save failed', true); return; }
    const result = await r.json();
    selectedGD = game_day;
    editMode = false;
    isNew = false;
    await loadStats();
    selectGD(game_day.game_no);
    showToast('Game Day saved!');
  } catch { showToast('An error occurred', true); }
}

async function deleteGD() {
  if (!confirm(`Delete Game Day ${selectedGD.game_no}?`)) return;
  try {
    const r = await fetch('/api/stats', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'delete_game_day', game_day: { game_no: selectedGD.game_no } })
    });
    if (!r.ok) { showToast('Delete failed', true); return; }
    selectedGD = null;
    await loadStats();
    document.getElementById('detail-panel').innerHTML = '<div class="empty-state"><i class="fas fa-hand-pointer"></i><div>Select a Game Day</div></div>';
    showToast('Game Day deleted');
  } catch { showToast('An error occurred', true); }
}

// ─── TOAST ───────────────────────────────────────────
function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── SESSION CHECK ───────────────────────────────────
(async function checkSession() {
  try {
    const r = await fetch('/api/stats');
    if (r.status === 401) return; // not logged in, show login screen
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    const body = await r.json();
    if (!r.ok) {
      document.getElementById('overall-grid').innerHTML =
        `<div style="color:var(--red);padding:20px;background:var(--card);border-radius:8px;font-size:0.85rem">
          <strong>API Error ${r.status}:</strong> ${body.error || 'Unknown'}<br>
          <span style="color:var(--text-dim);font-size:0.75rem">Check Vercel env vars: GITHUB_TOKEN, GITHUB_OWNER, GITHUB_REPO</span>
        </div>`;
      return;
    }
    statsData = body;
    renderOverall(body.overall);
    renderGDList(body.game_days);
  } catch (e) {
    // network error — stay on login screen
  }
})();
</script>
